version: '3.8'

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.10
    container_name: redpanda
    command:
      - redpanda
      - --overprovisioned
      - --smp=2
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=PLAINTEXT://redpanda:8082
      - --schema-registry-addr=0.0.0.0:8081
      - --advertise-schema-registry-addr=PLAINTEXT://redpanda:8081
    ports:
      - "9092:9092"    # Kafka API
      - "8081:8081"    # Schema Registry
      - "8082:8082"    # HTTP Proxy
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --timeout 3s"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ecom-network

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.6.1
    container_name: redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "redpanda:9092"
      KAFKA_SCHEMA_REGISTRY_ENABLED: "true"
      KAFKA_SCHEMA_REGISTRY_URLS: "http://redpanda:8081"
      REDPANDA_ADMIN_API_URLS: "http://redpanda:9644"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"
    networks:
      - ecom-network

volumes:
  redpanda_data:

networks:
  ecom-network:
    driver: bridge
