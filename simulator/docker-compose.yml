version: '3.8'

services:
  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecom-simulator
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - KAFKA_TOPIC=ecommerce-events
      - EVENTS_PER_SECOND=10
      - USER_POOL_SIZE=1000
      - SESSION_DURATION_MINUTES=30
      - PRODUCT_CATALOG_SIZE=50
      - CATEGORY_COUNT=10
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - ecom-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  ecom-network:
    external: true
